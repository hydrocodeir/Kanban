{% extends 'base.html' %}
{% block content %}
<div class="container py-5" style="max-width:420px;">
  <div class="card shadow-sm">
    <div class="card-body">
      <h1 class="h4 mb-3">ورود به سامانه</h1>
      {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
      <form method="post" action="/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="mb-3"><label class="form-label">نام کاربری</label><input class="form-control" name="username" required></div>
        <div class="mb-3"><label class="form-label">رمز عبور</label><input type="password" class="form-control" name="password" required></div>
        <button class="btn btn-primary w-100">ورود</button>
      </form>
      <a href="/register" class="d-block mt-3">ثبت‌نام</a>
    </div>
  </div>
</div>
{% endblock %}

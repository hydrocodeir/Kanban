<div class="board-columns-wrap">
  <div id="boardColumnsContainer" class="board-columns d-flex gap-3">
    {% for col in board.columns %}
      <div class="kanban-col card app-card" data-col-id="{{ col.id }}">
        <div class="card-header bg-white border-0 pb-0 kanban-col-header">
          <div class="d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-2">
              <span class="col-dot"></span>
              <span class="fw-bold">{{ col.title }}</span>
              <span class="badge text-bg-light col-count" data-col-id="{{ col.id }}">{{ col.tasks|length }}</span>
            </div>
            <div class="d-flex align-items-center gap-1">
              <button class="btn btn-sm btn-light icon-btn" title="ویرایش عنوان"
                data-bs-toggle="collapse" data-bs-target="#editCol-{{ col.id }}">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-sm btn-light icon-btn" title="حذف ستون"
                hx-delete="/htmx/projects/{{ board.project.id }}/columns/{{ col.id }}"
                hx-target="closest .kanban-col"
                hx-swap="outerHTML"
              >
                <i class="bi bi-trash3"></i>
              </button>
            </div>
          </div>

          <div class="collapse mt-2" id="editCol-{{ col.id }}">
            <form class="d-flex gap-2"
              hx-put="/htmx/projects/{{ board.project.id }}/columns/{{ col.id }}"
              hx-swap="none"
              hx-on::after-request="window.__kanbanReloadBoard && window.__kanbanReloadBoard()">
              <input name="title" class="form-control form-control-sm" value="{{ col.title }}" required>
              <button class="btn btn-sm btn-outline-primary">ذخیره</button>
            </form>
          </div>

          
          <div class="mt-2">
            <button type="button" class="btn btn-sm btn-outline-primary w-100 d-flex align-items-center justify-content-center gap-2"
              data-bs-toggle="collapse" data-bs-target="#addTask-{{ col.id }}">
              <i class="bi bi-plus-lg"></i>
              افزودن وظیفه
            </button>

            <div class="collapse mt-2" id="addTask-{{ col.id }}">
              <div class="task-add-box p-2">
                <form class="task-form d-flex flex-column gap-2"
                      hx-post="/htmx/projects/{{ board.project.id }}/tasks"
                      hx-target="#taskList-{{ col.id }}"
                      hx-swap="afterbegin"
                      hx-on::after-request="this.reset(); window.KanbanUI && KanbanUI.updateCounts && KanbanUI.updateCounts(); window.KanbanUI && KanbanUI.closeCollapse('addTask-{{ col.id }}');">
                  <input type="hidden" name="column_id" value="{{ col.id }}">

                  <input name="title" class="form-control form-control-sm" placeholder="عنوان کوتاه..." required>

                  <div class="d-flex gap-2">
                    <select name="priority" class="form-select form-select-sm">
                      <option value="1">اولویت: کم</option>
                      <option value="2" selected>اولویت: متوسط</option>
                      <option value="3">اولویت: زیاد</option>
                    </select>

                    <div class="w-100">
                      <input type="text" class="form-control form-control-sm jalali-date" placeholder="سررسید (شمسی)"
                             data-target="due-date-{{ col.id }}" autocomplete="off">
                      <input type="hidden" name="due_date" id="due-date-{{ col.id }}">
                    </div>
                  </div>

                  
                  <select name="assignee_id" class="form-select form-select-sm">
                    <option value="">انجام‌دهنده: بدون انتخاب</option>
                    {% for u in board.users %}
                      <option value="{{ u.id }}" {% if u.id == board.current_user_id %}selected{% endif %}>{{ u.full_name }}</option>
                    {% endfor %}
                  </select>

                  <textarea name="description" class="form-control form-control-sm" rows="2"
                            placeholder="توضیح کوتاه (اختیاری)"></textarea>

                  <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-primary flex-grow-1" type="submit">
                      ثبت وظیفه
                    </button>
                    <button class="btn btn-sm btn-light" type="button"
                      data-bs-toggle="collapse" data-bs-target="#addTask-{{ col.id }}">
                      بستن
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
    
        </div>

        <div class="card-body pt-2">
          <div class="task-list" id="taskList-{{ col.id }}" data-column-id="{{ col.id }}">
            {% for task in col.tasks %}
              {% include "partials/task_card.html" %}
            {% endfor %}
          </div>
        </div>
      </div>
    {% endfor %}
  </div>
</div>

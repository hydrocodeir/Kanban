<!doctype html>
<html lang="fa-IR" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#7367f0">
  <title>{{ title if title else "کانبان" }}</title>
  
  <!-- Bootstrap RTL -->
   <link href="/static/css/bootstrap.rtl.min.css" rel="stylesheet">
   <link href="/static/css/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Vazirmatn Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="/static/css/app.css" rel="stylesheet">
  <link href="/static/css/font.css" rel="stylesheet">
</head>

<body class="app-body">
  <div class="app-wrapper d-flex">

    <!-- Sidebar (Right) -->
    <aside class="app-sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">ک</div>
        <div class="brand-text">
          <div class="fw-bold">مدیریت پروژه‌ها</div>
          <div class="small text-muted">کانبان</div>
        </div>
      </div>

      <nav class="sidebar-nav mt-3">
        <a class="nav-item {% if active_nav=='dashboard' %}active{% endif %}" href="/dashboard">
          <i class="bi bi-grid-1x2"></i>
          <span>داشبورد</span>
        </a>
        <div class="nav-section-title">پروژه‌ها</div>
      </nav>
      <div class="sidebar-footer text-center mt-auto mb-3">
        <div class="small text-muted">نسخه 0.0.1</div>
        <div class="small text-muted">@HydroCode</div>
      </div>
    </aside>

    <!-- Main -->
    <main class="app-main flex-grow-1">
      <!-- Navbar -->
      <header class="app-navbar">
        <div class="navbar-inner d-flex align-items-center justify-content-between">
          <div class="d-flex align-items-center gap-3">
            {% if user %}<span class="small text-muted">کاربر: <span class="fw-semibold">{{ user.full_name }}</span></span>{% endif %}
            {% if user %}
            <a class="btn btn-sm btn-outline-danger rounded-pill" href="/logout">
              <i class="bi bi-box-arrow-right"></i>
              خروج
            </a>
            {% endif %}
            <button class="btn btn-sm btn-outline-secondary rounded-pill" type="button" onclick="location.href='/dashboard'">
              <i class="bi bi-house"></i>
              خانه
            </button>
          </div>
        </div>
      </header>

      <section class="app-content container-fluid">
        {% block content %}{% endblock %}
      </section>
    </main>
  </div>

  <!-- Scripts -->
   <script src="/static/js/bootstrap.bundle.min.js"></script>
   <script src="/static/js/htmx.min.js"></script>
  <script>
    // انیمیشن ملایم برای جایگذاری‌های HTMX
    htmx.config.defaultSwapStyle = "innerHTML";
    htmx.config.defaultSwapDelay = 0;
    htmx.config.defaultSettleDelay = 50;
  </script>
  <script src="/static/js/Sortable.min.js"></script>
  <script src="/static/js/jalali_datepicker.js"></script>
  <script src="/static/js/board.js"></script>
</body>
</html>

services:
  mysql:
    image: mariadb:10.11
    container_name: kanban-mysql
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: kanban_db
      MARIADB_USER: kanban
      MARIADB_PASSWORD: kanban
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./sample_data.sql:/docker-entrypoint-initdb.d/02_sample_data.sql:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped
  redis:
    image: redis:7
    container_name: kanban-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kanban-web
    env_file:
      - .env.docker
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:

version: '3.9'
services:
  app:
    build: .
    environment:
      DATABASE_URL: mysql+pymysql://kanban:kanban@mysql:3306/kanban?charset=utf8mb4
      SECRET_KEY: super-secret-change
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    depends_on:
      - mysql
    expose:
      - "8000"

  mysql:
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_DATABASE: kanban
      MYSQL_USER: kanban
      MYSQL_PASSWORD: kanban
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - mysql_data:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
